storage:
  type: sqlite
  path: /data/data.db

ui:
  title: "Long Lewis Status"
  header: " "
  logo: "data:image/svg+xml;base64,"
  favicon:
    default: "/favicon-32x32.png"
    size16x16: "/favicon-16x16.png"
    size32x32: "/favicon-32x32.png"
  custom-css: |
    /* Wordmark logo: allow it to be wide instead of a 48px square */
    header .w-12.h-12 { width: auto !important; }
    header img { height: 38px !important; width: auto !important; max-width: 260px; }
    /* Force the near-black wordmark to render white in dark mode */
    html.dark header img { filter: brightness(0) invert(1); }
    /* Remove the header text next to the logo */
    header h1 { display: none !important; }
    /* Remove the GitHub logo in the bottom-right */
    #social { display: none !important; }

